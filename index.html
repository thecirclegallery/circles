<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>*ೃ༄ kittens gallery ✧.*</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="site-wrapper">
        
        <header id="top-banner">
            <h1>*ೃ༄ kittens gallery ✧.*</h1>
            </header>

        <div id="layout-columns">
            
            <aside id="sidebar">
            

                <div class="cute-box">
                    <div class="box-title">🧸 Navigation 🧸</div>
                    <div class="box-content links-list">
                        <a href="index.html">⟡ Home</a>
                        <a href="about.html">⟡ About Me</a>
                        <a href="#">⟡ Guestbook</a>
                    </div>
                </div>

            </aside>

            <main id="main-content">
                
                <div class="cute-box">
                    <div class="box-title">🌸 Vent Gallery 🌸</div>
                    <div class="box-content">
                        <p class="intro-text">Click on any circle to view it closer.</p>
                        
                        <div class="gallery-grid">
                            
                            <div class="art-thumbnail">
                                <img src="pinkneon.JPG" alt="Vent Art 1" class="zoomable">
                                <div class="protection-overlay"></div>
                            </div>

                        </div>
                    </div>
                </div>

            </main>

        </div>
    </div>

    <div id="lightbox" class="hidden">
        <div id="lightbox-content">
            <button id="close-btn">✖ CLOSE</button>
            <img id="lightbox-img" src="" alt="Expanded Art">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
