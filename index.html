<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Andromeda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gallery-container">
        <!-- square -->
        <div class="art-square" style="top: 20%; left: 15%;">
            <img src="pinkneon.JPG" alt="Vent Art">
            <div class="protection-overlay"></div>
        </div>

        <!-- Copy and paste this block to add more squares -->
        <div class="art-square" style="top: 40%; left: 50%;">
            <img src="your-next-image.JPG" alt="Vent Art">
            <div class="protection-overlay"></div>
        </div>
        
    </div>
    <!-- Focus Mode Overlay -->
    <div id="lightbox" class="hidden">
        <div id="lightbox-content">
            <img id="lightbox-img" src="" alt="Expanded Art">
            <button id="close-btn">CLOSE [X]</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
