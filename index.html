<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDROMEDA_OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- The Desktop where your glossy icons live -->
    <div class="desktop">
        
        <!-- ART ICON 1 -->
        <div class="file-icon" data-src="pinkneon.JPG">
            <div class="icon-glass">
                <img src="pinkneon.JPG" alt="Vent Art">
            </div>
            <span class="file-name">01_vent.dat</span>
        </div>

        <!-- ART ICON 2 (Replace 'your-next-art.JPG' with your real file name) -->
        <div class="file-icon" data-src="your-next-art.JPG">
            <div class="icon-glass">
                <img src="your-next-art.JPG" alt="Vent Art">
            </div>
            <span class="file-name">02_vent.dat</span>
        </div>

    </div>

    <!-- The 2006 Aero Glass Pop-Up Window -->
    <div id="image-window" class="hidden">
        <div class="window-inner">
            <div class="window-header">
                <span class="window-title">System // Andromeda</span>
                <button id="close-btn" title="Close"></button>
            </div>
            <div class="window-content">
                <img id="window-img" src="" alt="Expanded Art">
                <div class="protection-overlay"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
