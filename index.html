<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System: ANDROMEDA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="console-container">
        <!-- The cute, technical header -->
        <header class="console-header">
            <span>SYSTEM://ANDROMEDA</span>
            <span>VENT_ARCHIVE</span>
        </header>
        
        <!-- The Main Viewing Screen -->
        <div class="main-screen">
            <img id="main-art" src="pinkneon.JPG" alt="Andromeda Vent Space">
            <div class="protection-overlay"></div>
        </div>

        <!-- The Interactive Thumbnail Track -->
        <div class="archive-track">
            
            <!-- Thumbnail 1 (Currently Active) -->
            <div class="thumb-wrapper active">
                <img class="thumb" src="pinkneon.JPG" alt="Art 1">
                <div class="protection-overlay"></div>
            </div>

            <!-- Thumbnail 2 (Replace 'your-next-art.JPG' with your real file name) -->
            <div class="thumb-wrapper">
                <img class="thumb" src="your-next-art.JPG" alt="Art 2">
                <div class="protection-overlay"></div>
            </div>
            
            <!-- You can copy and paste the .thumb-wrapper block to add as many as you want! -->

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
