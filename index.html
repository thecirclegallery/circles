<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gallery-container">
        <!-- Repeat this block for every piece of art -->
        <div class="art-circle" style="top: 20%; left: 15%;">
            <img src="images/art1.png" alt="Art">
            <div class="protection-overlay"></div>
        </div>

        <div class="art-circle" style="top: 40%; left: 50%;">
            <img src="images/art2.png" alt="Art">
            <div class="protection-overlay"></div>
        </div>

        <div class="art-circle" style="top: 10%; left: 70%;">
            <img src="images/art3.png" alt="Art">
            <div class="protection-overlay"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
