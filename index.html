<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANDROMEDA_OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Subtle Retro Screen Lines -->
    <div class="scanlines"></div>

    <!-- The Desktop where your icons live -->
    <div class="desktop">
        
        <!-- ART ICON 1 -->
        <!-- Note: the 'data-src' is what tells the window which image to open -->
        <div class="file-icon" data-src="pinkneon.JPG">
            <img src="pinkneon.JPG" alt="Vent Art">
            <span class="file-name">01_vent.dat</span>
        </div>

        <!-- ART ICON 2 (Just replace 'your-next-art.JPG') -->
        <div class="file-icon" data-src="your-next-art.JPG">
            <img src="your-next-art.JPG" alt="Vent Art">
            <span class="file-name">02_vent.dat</span>
        </div>

    </div>

    <!-- The Pop-Up Window (Hidden until an icon is clicked) -->
    <div id="image-window" class="hidden">
        <div class="window-header">
            <span class="window-title">SYS.VIEWER // ANDROMEDA</span>
            <button id="close-btn">[X]</button>
        </div>
        <div class="window-content">
            <img id="window-img" src="" alt="Expanded Art">
            <div class="protection-overlay"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
